<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="../CSS/register.css">
 
</head>
<body>
  
     <header class="navbar">
       <h2 class="nav-logo"><span><img src="../Images/waves.png" alt="ResFlow icon" class="res-icon"> </span><span>ResFlow</span></h2>
        <a href="./index.html"><button type="button" class="home-btn">← Home</button></a>
    </header>
    
    
    <div class="container">
        <div class="card">
           <h2><span>ResFlow</span></h2>
           <h3>Sign In</h3>
           <p class="subtitle">Access your resource management dashboard</p>
          <form>
            
              <div class="form-group">
                  <label for="loginEmail">Email</label> <br>
                  <input type="email" placeholder="Enter Registered ID" id="loginEmail">
                   <br>
                  <label for="loginPassword">Password </label> <br>
                  <input type="password" placeholder="Enter Password" id="loginPassword"> 
               </div>
              
<div class="form-group full">
  <label>Sign in as</label>

  <div class="account-type">

    <!-- Citizen -->
    <label class="option">
      <input type="radio" name="atype" value="citizen">
      <span>Citizen 👤</span>
    </label>

    <!-- LPG Dealer -->
    <label class="option">
      <input type="radio" name="atype" value="dealer_lpg">
      <span>LPG Dealer 🔥</span>
    </label>

    <!-- Fuel Dealer -->
    <label class="option">
      <input type="radio" name="atype" value="dealer_fuel">
      <span>Fuel Dealer ⛽</span>
    </label>

  </div>
</div>
              <button type=button class="submit-btn" id="signin">Sign In</button>

              <p class="signin">
                    Don't have an account? <a href="register.html">Register here</a>
              </p>
                 
    
          </form>
        </div>
    </div>
<script src="../JavaScript/login.js">
</script></body>
</html>
