<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResFlow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>


  <div class="container_register">
    <h2>Register</h2>
    <form class="form-grid">

      <div class="Register_details">
        <label for="fname">Full name</label>
        <input type="text" id="fname" required placeholder="Enter your full name">
      </div>

      <div class="Register_details">
        <label for="number">Phone number</label>
        <input type="number" id="number" placeholder="Enter your phone number" required>
      </div>

      <div class="Register_details">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter a valid email id" required>
      </div>

      <div class="Register_details">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" minlength="8" required>
      </div>

      <div class="Register_details">
        <label for="pin">PIN Code</label>
        <input type="number" id="pin" required>
      </div>

      <div class="Register_details">
        <label for="house_hold_size">Household Size</label>
        <input type="number" id="house_hold_size" required>
      </div>
      <div class="Register_details_full">
        <label for="ration">Ration Number</label>
        <textarea row="3"></textarea>
      </div>

      <div class="Register_details_full">
        <label for="address">Address</label>
        <textarea row="3"></textarea>
      </div>

      <div class="Register_details_full">
        <label for="category">Ration Card Type</label>
        <select>
          <option value="AAY">AAY (Antyodaya Anna Yojana)</option>
          <option value="PHH">PHH (Priority Household)</option>
          <option value="NPHH">NPHH (Non-Priority Household)</option>
        </select>
      </div>

      <div class="button-group">
        <button type="submit" class="reg_btn">Register</button>
        <button type="reset" class="reset_btn">Reset</button>
      </div>

    </form>
  </div>



























</body>



</html>
