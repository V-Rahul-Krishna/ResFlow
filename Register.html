<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <title>ResFlow - Register</title>
    
    <link rel="stylesheet" href="register.css">
</head>
<body>
  <script>
if (!localStorage.getItem("users")) {
  localStorage.setItem("users", JSON.stringify([]));
}
</script>

    <header class="navbar">
        <div class="nav-logo">
            <div class="logo">RF</div>
            <h2>ResFlow</h2>
        </div>
        <button class="home-btn">← Home</button>
    </header>

    <div class="container">
        <div class="card">
            <h2><span><img src="./Images/waves.png" alt="ResFlow icon" class="res-icon"> </span><span>ResFlow — New Registration</span></h2>
            <h3>Create Account</h3>
            <p class="subtitle">Register to access the resource distribution platform</p>

            <form>
                <div class="grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="As per Aadhaar" required id="name">
                    </div>

                    <div class="form-group">
                        <label>Aadhaar Number</label>
                        <input type="text" placeholder="XXXX-XXXX-XXXX" required>
                    </div>

                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" placeholder="+91 XXXXX XXXXX" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="email@example.com" required id="email">
                    </div>

<div class="form-group">
    <label>State / Union Territory</label>
    <select required>
        <option value="">Select State / UT</option>

        <!-- STATES -->
        <option>Andhra Pradesh</option>
        <option>Arunachal Pradesh</option>
        <option>Assam</option>
        <option>Bihar</option>
        <option>Chhattisgarh</option>
        <option>Goa</option>
        <option>Gujarat</option>
        <option>Haryana</option>
        <option>Himachal Pradesh</option>
        <option>Jharkhand</option>
        <option>Karnataka</option>
        <option>Kerala</option>
        <option>Madhya Pradesh</option>
        <option>Maharashtra</option>
        <option>Manipur</option>
        <option>Meghalaya</option>
        <option>Mizoram</option>
        <option>Nagaland</option>
        <option>Odisha</option>
        <option>Punjab</option>
        <option>Rajasthan</option>
        <option>Sikkim</option>
        <option>Tamil Nadu</option>
        <option>Telangana</option>
        <option>Tripura</option>
        <option>Uttar Pradesh</option>
        <option>Uttarakhand</option>
        <option>West Bengal</option>

        <!-- UNION TERRITORIES -->
        <option>Andaman and Nicobar Islands</option>
        <option>Chandigarh</option>
        <option>Dadra and Nagar Haveli and Daman and Diu</option>
        <option>Delhi (NCT)</option>
        <option>Jammu and Kashmir</option>
        <option>Ladakh</option>
        <option>Lakshadweep</option>
        <option>Puducherry</option>
    </select>
</div>

                    <div class="form-group">
                        <label>District</label>
                        <input type="text" placeholder="Enter district" required>
                    </div>

                    <div class="form-group">
                        <label>PIN Code</label>
                        <input type="text" placeholder="6-digit PIN" required>
                    </div>


                </div>
                <div class="form-group full">
  <label>House No / Building Name</label>
  <input type="text" placeholder="e.g. 12A, Lakshmi Apartments" required id="house">
</div>

<div class="form-group full">
  <label>Street / Area / Locality</label>
  <input type="text" placeholder="e.g. Anna Nagar, 2nd Street" required id="street">
</div>

<div class="form-group full">
  <label>Landmark (Optional)</label>
  <input type="text" placeholder="Near temple / school / bus stop" id="landmark">
</div>


<div class="form-group full">
  <label>Account Type</label>

  <div class="account-type">

    <!-- Citizen -->
    <label class="option">
      <input type="radio" name="atype" value="citizen">
      <span>Citizen 👤</span>
    </label>

    <!-- LPG Dealer -->
    <label class="option">
      <input type="radio" name="atype" value="dealer_lpg">
      <span>LPG Dealer 🔥</span>
    </label>

    <!-- Fuel Dealer -->
    <label class="option">
      <input type="radio" name="atype" value="dealer_fuel">
      <span>Fuel Dealer ⛽</span>
    </label>

  </div>
</div>

                <div class="form-group full">
                    <label>Create Password</label>
                    <input type="password" placeholder="Min 8 characters" required id="password">
                </div>

                <p class="terms">
                    By registering, you agree to the Terms of Use. Your Aadhaar details will be verified with UIDAI.
                </p>

                <button type="button" class="submit-btn" onclick="register()">Register & Continue →</button>

                <p class="signin">
                    Already registered? <a href="login.html">Sign in</a>
                </p>
            </form>
        </div>
    </div>
<script>
function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const type = document.querySelector('input[name="atype"]:checked');
  if (!type) {
    alert("Select account type");
    return;
  }

  const user = {
    id: "RF" + Math.floor(1000 + Math.random() * 9000),
    name,
    email,
    password,
    type: type.value
  };

  // 🔹 Get existing users or empty array
  const users = JSON.parse(localStorage.getItem("users")) || [];

  // 🔹 Prevent duplicate email
  const exists = users.some(u => u.email === email);
  if (exists) {
    alert("User already registered!");
    return;
  }

  users.push(user);

  // 🔹 Save back
  localStorage.setItem("users", JSON.stringify(users));

  alert("Registration successful!");
  window.location.href = "login.html";
}
</script></body>
</html>
