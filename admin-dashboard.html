<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>

<header class="topbar">
  <h1>Admin Panel</h1>
  <span>System Administrator</span>
</header>

<main class="dashboard">
  <section class="stats">
    <div class="card"><h3>Hospitals</h3><p>24</p></div>
    <div class="card"><h3>Suppliers</h3><p>12</p></div>
    <div class="card"><h3>Pending Requests</h3><p>7</p></div>
  </section>

  <section class="table-section">
    <h2>System Activity</h2>
    <table>
      <tr><th>Role</th><th>Name</th><th>Status</th></tr>
      <tr><td>Hospital</td><td>City Care</td><td>Active</td></tr>
      <tr><td>Supplier</td><td>MediSupply</td><td>Pending</td></tr>
    </table>
  </section>
</main>
<script src="main.js"></script>

</body>
</html>
