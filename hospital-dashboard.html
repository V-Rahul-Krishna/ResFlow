<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital Dashboard</title>
<link rel="stylesheet" href="hospital-dashboard.css">
</head>
<body>

<header class="topbar">
  <h1>Hospital Dashboard</h1>
  <span>City Care Hospital</span>
</header>

<main class="dashboard">
  <section class="stats">
    <div class="card"><h3>Total Orders</h3><p>18</p></div>
    <div class="card"><h3>Pending</h3><p>5</p></div>
    <div class="card"><h3>Delivered</h3><p>13</p></div>
  </section>

  <section class="table-section">
    <h2>Supply Requests</h2>
    <table>
      <tr><th>Item</th><th>Quantity</th><th>Status</th></tr>
      <tr><td>Gloves</td><td>500</td><td>Approved</td></tr>
      <tr><td>Masks</td><td>1000</td><td>Pending</td></tr>
    </table>
  </section>
</main>
<script src="main.js"></script>

</body>
</html>
