<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Login</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<header class="auth-header">
  <h1>Hospital Access Portal</h1>
  <p>Authorized hospitals only · Registration done offline</p>
</header>

<main class="auth-container">
  <div class="auth-card">
    <h2>Hospital Login</h2>
    <p class="auth-info">
      Login using credentials provided by the authority.
    </p>

    <form>
      <label for="hospitalId">Hospital ID</label>
      <input type="text" id="hospitalId" placeholder="Enter Hospital ID" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter Password" required>

      <button type="submit">Login</button>
    </form>

    <p class="note">
      Registration is completed in person by government officials.
    </p>
  </div>
</main>

<footer class="auth-footer">
  © 2026 Smart LPG Priority Allocation System · Hospital Module
</footer>

</body>
</html>
