<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="register.css">
 
</head>
<body>
     <header class="navbar">
        <div class="logo">RF <span>ResFlow</span></div>
        <button class="home-btn">← Home</button>
    </header>
    
    
    <div class="container">
        <div class="card">
           <h2><span><img src="./Images/waves.png" alt="ResFlow icon" class="res-icon"> </span><span>ResFlow</span></h2>
           <h3>Sign In</h3>
           <p class="subtitle">Access your resource management dashboard</p>
          <form>
            
              <div class="form-group">
                  <label>Email</label> <br>
                  <input type="email" placeholder="Enter Registered ID" id="loginEmail">
                   <br>
                  <label>Password </label> <br>
                  <input type="password" placeholder="Enter Password" id="loginPassword"> 
               </div>
              
               <div class="form-group full">
                    <label>Sign in as</label>
                    <div class="account-type">
  <label class="option">
    <input type="radio" name="atype" value="citizen">
    <span>Citizen 👤</span>
  </label>

  <label class="option">
    <input type="radio" name="atype" value="dealer">
    <span>Dealer 🏪</span>
  </label>
</div>
              </div>
              <button type="button" class="submit-btn" onclick="login()">Sign In</button>

              <p class="signin">
                    Don't have an account? <a href="register.html">Register here</a>
              </p>
                 
    
          </form>
        </div>
    </div>
    <script>
function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const userType = document.querySelector('input[name="atype"]:checked');

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  if (!userType) {
    alert("Please select account type");
    return;
  }

  const storedUser = JSON.parse(localStorage.getItem("userData"));

  if (!storedUser) {
    alert("No user registered!");
    return;
  }

  if (email === storedUser.email && password === storedUser.password) {
    alert("Login successful!");

    if (userType.value === "citizen") {
      window.location.href = "citizen.html";
    } else if (userType.value === "dealer") {
      window.location.href = "dealer.html";
    }

  } else {
    alert("Invalid email or password");
  }
}
</script>
</body>
