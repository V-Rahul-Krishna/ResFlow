<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="register.css">
 
</head>
<body>
     <header class="navbar">
        <div class="logo">RF <span>ResFlow</span></div>
        <button class="home-btn">← Home</button>
    </header>
    
    
    <div class="container">
        <div class="card">
           <h2><span><img src="./Images/waves.png" alt="ResFlow icon" class="res-icon"> </span><span>ResFlow</span></h2>
           <h3>Sign In</h3>
           <p class="subtitle">Access your resource management dashboard</p>
          <form>
            
              <div class="form-group">
                  <label>Mobile / Aadhar / Email</label> <br>
                  <input type="text" placeholder="Enter Registered ID">
                   <br>
                  <label>Password </label> <br>
                  <input type="password" placeholder="Enter Password"> 
               </div>
              
               <div class="form-group full">
                    <label>Sign in as</label>
                    <div class="account-types">
                        <div class="type active">👤 Citizen</div>
                        <div class="type">🏪 Dealer</div>
                        <div class="type">🏥 Hospital</div>
                    </div>
              </div>
              <button class="submit-btn">Sign In</button>

              <p class="signin">
                    Don't have an account? <a href="register.html">Register here</a>
              </p>
                 
    
          </form>
        </div>
    </div>
    
</body>
