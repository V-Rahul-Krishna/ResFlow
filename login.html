<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="register.css">
 
</head>
<body>
  
     <header class="navbar">
       <h2 class="nav-logo"><span><img src="./Images/waves.png" alt="ResFlow icon" class="res-icon"> </span><span>ResFlow</span></h2>
        <button class="home-btn">← Home</button>
    </header>
    
    
    <div class="container">
        <div class="card">
           <h2><span>ResFlow</span></h2>
           <h3>Sign In</h3>
           <p class="subtitle">Access your resource management dashboard</p>
          <form>
            
              <div class="form-group">
                  <label for="loginEmail">Email</label> <br>
                  <input type="email" placeholder="Enter Registered ID" id="loginEmail">
                   <br>
                  <label for="loginPassword">Password </label> <br>
                  <input type="password" placeholder="Enter Password" id="loginPassword"> 
               </div>
              
<div class="form-group full">
  <label>Sign in as</label>

  <div class="account-type">

    <!-- Citizen -->
    <label class="option">
      <input type="radio" name="atype" value="citizen">
      <span>Citizen 👤</span>
    </label>

    <!-- LPG Dealer -->
    <label class="option">
      <input type="radio" name="atype" value="dealer_lpg">
      <span>LPG Dealer 🔥</span>
    </label>

    <!-- Fuel Dealer -->
    <label class="option">
      <input type="radio" name="atype" value="dealer_fuel">
      <span>Fuel Dealer ⛽</span>
    </label>

  </div>
</div>
              <button type=button class="submit-btn" id="signin">Sign In</button>

              <p class="signin">
                    Don't have an account? <a href="register.html">Register here</a>
              </p>
                 
    
          </form>
        </div>
    </div>
<script>
document.getElementById("signin").addEventListener("click", function () {

  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  const userType = document.querySelector('input[name="atype"]:checked');

  console.log("INPUT:", email, password, userType?.value);

  const users = JSON.parse(localStorage.getItem("users"));
  console.log("USERS IN STORAGE:", users);

  if (!users || users.length === 0) {
    console.log("❌ USERS EMPTY OR MISSING");
    return;
  }

  const matchedUser = users.find(
    u =>
      u.email === email &&
      u.password === password &&
      u.type === userType.value
  );

  console.log("MATCHED USER:", matchedUser);

  if (!matchedUser) {
    alert("❌ INVALID CREDENTIALS");
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(matchedUser));

if (matchedUser.type === "citizen") {
  window.location.href = "citizen.html";
}
else if (matchedUser.type === "lpgDealer") {
  window.location.href = "dealer-lpg.html";
}
else if (matchedUser.type === "fuelDealer") {
  window.location.href = "fuel-dealer.html";
}
});
</script></body>
</html>
