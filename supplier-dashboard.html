<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supplier Dashboard</title>
<link rel="stylesheet" href="supplier-dashboard.css">
</head>
<body>

<header class="topbar">
  <h1>Supplier Dashboard</h1>
  <span>MediSupply Pvt Ltd</span>
</header>

<main class="dashboard">
  <section class="stats">
    <div class="card"><h3>Orders Received</h3><p>22</p></div>
    <div class="card"><h3>In Progress</h3><p>6</p></div>
    <div class="card"><h3>Completed</h3><p>16</p></div>
  </section>

  <section class="table-section">
    <h2>Orders</h2>
    <table>
      <tr><th>Hospital</th><th>Item</th><th>Status</th></tr>
      <tr><td>City Care</td><td>Masks</td><td>Processing</td></tr>
      <tr><td>LifeLine</td><td>Sanitizers</td><td>Delivered</td></tr>
    </table>
  </section>
</main>
<script src="main.js"></script>

</body>
</html>
