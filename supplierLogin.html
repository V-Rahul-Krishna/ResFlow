<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supplier Login</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<header class="auth-header">
  <h1>Supplier Access Portal</h1>
  <p>Verified LPG suppliers only · No online registration</p>
</header>

<main class="auth-container">
  <div class="auth-card">
    <h2>Supplier Login</h2>
    <p class="auth-info">
      Access restricted to approved LPG suppliers.
    </p>

    <form>
      <label for="supplierId">Supplier ID</label>
      <input type="text" id="supplierId" placeholder="Enter Supplier ID" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter Password" required>

      <button type="submit">Login</button>
    </form>

    <p class="note">
      Supplier registration is handled offline through authorities.
    </p>
  </div>
</main>

<footer class="auth-footer">
  © 2026 Smart LPG Priority Allocation System · Supplier Module
</footer>
<script src="main.js"></script>

</body>
</html>
