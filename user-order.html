<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Order Dashboard</title>
<link rel="stylesheet" href="user-order.css">
</head>
<body>

<header class="topbar">
  <h1>User Ordering Panel</h1>
  <span>Verified Ration Card Holder</span>
</header>

<main class="dashboard">

  <section class="priority-card">
    <h2>LPG Priority Status</h2>
    <div class="priority-info">
      <div><strong>Priority Level:</strong> High</div>
      <div><strong>Family Members:</strong> 5</div>
      <div><strong>Income Category:</strong> Low</div>
    </div>
    <p class="priority-note">
      LPG allocation is based on government-defined priority rules.
    </p>
  </section>

  <section class="order-section">
    <div class="order-card">
      <h3>Order LPG Cylinder</h3>
      <form>
        <label>Cylinder Type</label>
        <select>
          <option>Domestic LPG</option>
        </select>

        <label>Quantity</label>
        <input type="number" min="1" max="1" value="1">

        <button type="submit">Request LPG</button>
      </form>
    </div>

    <div class="order-card">
      <h3>Order Fuel</h3>
      <form>
        <label>Fuel Type</label>
        <select>
          <option>Petrol</option>
          <option>Diesel</option>
          <option>Oil</option>
        </select>

        <label>Quantity (Litres)</label>
        <input type="number" min="1" placeholder="Enter quantity">

        <button type="submit">Place Fuel Order</button>
      </form>
    </div>
  </section>

</main>

<footer class="footer">
  <p>© 2026 Smart Priority Fuel & LPG Allocation System</p>
</footer>
<script src="main.js"></script>

</body>
</html>
