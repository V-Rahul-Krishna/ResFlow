<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login | Essential Commodity Distribution System</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

  <header class="auth-header">
    <h1>ESSENTIAL COMMODITY DISTRIBUTION SYSTEM</h1>
    <p>Secure Login for Verified Users</p>
  </header>

  <main class="auth-container">

    <section class="auth-card">
      <h2>User Login</h2>
      <p class="auth-info">
        Login access is restricted to users who have completed
        ration card verification.
      </p>

      <form>
        <label>Ration Card Number</label>
        <input type="text" placeholder="Enter ration card number" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
      </form>

      <p class="note">
        New user?
        <a href="userRegister.html">Register here</a>
      </p>
    </section>

  </main>

  <footer class="auth-footer">
    <p>
      © 2026 Essential Commodity Distribution System | Academic Project
    </p>
  </footer>
<script src="main.js"></script>

</body>
</html>
